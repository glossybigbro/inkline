name: Build

on:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Build
        run: ./gradlew assemble

      - name: Unit tests
        run: ./gradlew :inkline:testDebugUnitTest

      - name: Screenshot tests
        run: ./gradlew :inkline:verifyRoborazziDebug

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: inkline/build/reports/tests/

      - name: Upload screenshot diffs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: screenshot-diffs
          path: inkline/build/outputs/roborazzi/
