<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100" role="img" aria-label="Inkline">
  <title>Inkline</title>
  <defs>
    <linearGradient id="inkline-rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6">
        <animate attributeName="stop-color"
                 values="#3B82F6;#8B5CF6;#EC4899;#F59E0B;#10B981;#3B82F6"
                 dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#EC4899">
        <animate attributeName="stop-color"
                 values="#EC4899;#F59E0B;#10B981;#3B82F6;#8B5CF6;#EC4899"
                 dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color"
                 values="#10B981;#3B82F6;#8B5CF6;#EC4899;#F59E0B;#10B981"
                 dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <style>
    .wordmark { fill: #0F172A; }
    @media (prefers-color-scheme: dark) {
      .wordmark { fill: #F1F5F9; }
    }
  </style>
  <text x="140" y="58"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif"
        font-size="48"
        font-weight="700"
        letter-spacing="-1"
        class="wordmark">Inkline</text>
  <path d="M 60 82 Q 70 92 80 82 T 100 82 T 120 82 T 140 82 T 160 82 T 180 82 T 200 82 T 220 82"
        stroke="url(#inkline-rainbow)"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"/>
</svg>
